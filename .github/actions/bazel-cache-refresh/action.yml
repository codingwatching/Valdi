name: 'Refresh Bazel Cache Auth'
description: 'Re-authenticate to GCP and rewrite the Bazel remote_cache Authorization header. Use between long-running steps so the GCS access token does not expire mid-build.'

inputs:
  gcp_project_id:
    description: 'GCP project ID'
    required: true
  workload_identity_provider:
    description: 'Full workload identity provider resource name'
    required: true
  service_account:
    description: 'GCP service account email'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Re-authenticate to Google Cloud
      id: auth
      continue-on-error: true
      uses: google-github-actions/auth@v2
      with:
        project_id: ${{ inputs.gcp_project_id }}
        workload_identity_provider: ${{ inputs.workload_identity_provider }}
        service_account: ${{ inputs.service_account }}
        token_format: 'access_token'

    - name: Rewrite Authorization header in Bazel cache configs
      shell: bash
      env:
        AUTH_OUTCOME: ${{ steps.auth.outcome }}
        ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
      run: |
        if [ "$AUTH_OUTCOME" != "success" ]; then
          echo "Auth refresh skipped (no WIF token available). Leaving existing cache config in place."
          exit 0
        fi

        rewrite_rc() {
          local rc="$1"
          [ -f "$rc" ] || return 0
          local tmp="$rc.refresh.tmp"
          grep -v '^build "--remote_header=Authorization=Bearer' "$rc" > "$tmp" || true
          mv "$tmp" "$rc"
          echo "build \"--remote_header=Authorization=Bearer $ACCESS_TOKEN\"" >> "$rc"
        }

        rewrite_rc ".bazelrc.local"
        if [ -n "$BAZEL_CACHE_RC" ]; then
          rewrite_rc "$BAZEL_CACHE_RC"
        fi

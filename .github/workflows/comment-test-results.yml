name: Comment Test Results

on:
  workflow_run:
    workflows: ["Valdi CI"]
    types:
      - completed

permissions:
  pull-requests: write

jobs:
  comment:
    name: Post Results Comment
    runs-on: ubuntu-latest
    if: github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.conclusion != 'skipped'

    steps:
      - name: Find PR number
        id: find-pr
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const pulls = run.pull_requests;
            if (pulls && pulls.length > 0) {
              return pulls[0].number;
            }
            if (run.head_repository) {
              const { data: prs } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                head: `${run.head_repository.owner.login}:${run.head_branch}`,
              });
              if (prs.length > 0) {
                return prs[0].number;
              }
            }
            core.setFailed('Could not find PR number');

      - name: Comment on PR
        if: steps.find-pr.outputs.result
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ steps.find-pr.outputs.result }};
            const runId = context.payload.workflow_run.id;

            const jobs = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId,
            });

            let tableRows = [];
            let allPassed = true;

            for (const job of jobs.data.jobs) {
              if (job.name.includes('Comment Test Results') || job.name.includes('Post Results Comment')) {
                continue;
              }

              const icon = job.conclusion === 'success' ? '✅' : '❌';
              tableRows.push(`| ${job.name} | ${icon} ${job.conclusion} |`);

              if (job.conclusion !== 'success') {
                allPassed = false;
              }
            }

            if (tableRows.length === 0) {
              return;
            }

            const emoji = allPassed ? '🎉' : '⚠️';
            const message = allPassed
              ? '**All Bazel configuration and CI tests passed!** ✨\n\nThe build system and core tooling are working correctly.'
              : '**Some tests failed.** Please check the workflow logs for details.';

            const body = `## ${emoji} Bazel & CI Test Results

            | Test Suite | Result |
            |------------|--------|
            ${tableRows.join('\n')}

            ${message}

            🚀 _Bazel remote cache is now enabled - future builds will be faster!_

            <sub>Workflow: [Valdi CI](${context.payload.repository.html_url}/actions/runs/${runId})</sub>`;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const existing = comments.find(c => c.body && c.body.includes('Bazel & CI Test Results'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: body,
              });
            }
